name: Trading Stop-Check & Email Alert

on:
  schedule:
    - cron: '0 7 * * 1-5'
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  stop_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pandas

      - name: Run Stop Check
        env:
          EODHD_API_KEY: 69c0f8ad5ac198.37699109
          EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python stop_check.py
